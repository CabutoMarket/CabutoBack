{% load static %} {% include 'Shared/header.html' %} {% include 'Shared/navbar.html' %} {% include 'Shared/sidebar.html' %}

<style>
    .upload-container img{
        width: 3rem;
        height: 3rem;
        margin-top: 3rem;
    }

    .upload-container{
	    height:9rem;
	    text-align:center;
	    background-color:#EDEEF0;
	    border-radius: 10px;
    }

    .input{
   	    background-color:#D8D9DD;
        border-radius: 8px;
    }

    .modal-footer{
	    text-align:center;
	    display: block;
    }

    .btn-warning{
        background-color: #87868A;
    }

    .btn-sucess{
        background: linear-gradient(to right, #2153FF, #0F195E);
    }

    .btn{
        color: white;
        width: 9rem;
    }

    textarea[name="descripcion"]{
        height: 10rem;
    }

    h2{
        color: #0F195E;
        font-family: calibri;
        font-weight: bold;
    }

</style>

<div id="popup" class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">AGREGAR PRODUCTO</h2>
                <button class="close" type="button" data-dismiss="modal" aria-label="close">
                    <span aria-hidden="true">&times;</span>
                </button>
        </div>
        <form action="" method="POST" enctype="multipart/form-data" class="col-md-12">
            {% csrf_token %}
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">
                        <div class="input-container ">
                            <div class="upload-container center-block">
					            <label class="btn btn-default btn-sm center-block btn-file">
                                    <img class="img-subir center-block" src="{% static 'img/iconos_administrador/agregar_imagen.png' %}">
					                <input type="file" style="display: none;" accept=".jpg, .png, .jpeg, .svg" class="form-control input" onchange="loadImage(event)" name="image" required>
                                </label>
                            </div>
                        </div>
                        <br>
                        <div class="input-container">
					        <label>Nombre del Producto</label>
					        <input type="text" class="form-control input" name="nombre" required>
				        </div>
                        <br>
				        <div class="input-container">
					        <label>Precio</label>
                            <input type="number" step="0.001" class="form-control input" name="precio" required>
				        </div>
                    </div>
                    <div class="col-md-6">
				        <div class="input-container">
					        <label>Categoría</label>
                            <br>
                            <select name="item_id" required>
                            {% for entry in data %}
                                <option class="input" value="{{ entry.id_categoria }}" name="id_categoria">{{ entry.nombre }}</option>
                            {% endfor %}
                            </select>
				        </div>
                        <br>
                        <div class="input-container">
                            <label>Cantidad del Stock</label>
					        <input type="number" class="form-control input" name="stock_disponible" required>
				        </div>
                        <br>
                        <div class="input-container">
					        <label>Descripción</label>
					        <textarea class="form-control input" name="descripcion" required></textarea>
				        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-warning" id="limpiarCampos-btn" type="button" data-dismiss="modal">Cancelar</button>
                <button class="btn btn-sucess" id="guardar-btn" type="submit">Agregar</button>
            </div>
        </form>
    </div>
</div>
<script type="text/javascript" src="{% static 'js/formulario.js' %}"></script>
<script>
    var loadImage = function(event) {
    var output = document.getElementById('img-subir');
    outpur.src={% static 'img/iconos_administrador/agregar_imagen.png' %}
    output.src = URL.createObjectURL(event.target.files[0]);
    output.onload = function() {
    URL.revokeObjectURL(output.src) // free memory
    }

  };
</script>
